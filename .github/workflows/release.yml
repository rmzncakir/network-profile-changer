name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: ver
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test NetworkProfileManager.Tests/NetworkProfileManager.Tests.csproj --configuration Release --logger "console;verbosity=minimal"

      - name: Publish (self-contained win-x64)
        run: >
          dotnet publish NetworkProfileManager/NetworkProfileManager.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:Version=${{ steps.ver.outputs.version }}
          -p:AssemblyVersion=${{ steps.ver.outputs.version }}.0
          -p:FileVersion=${{ steps.ver.outputs.version }}.0
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:PublishReadyToRun=false
          -o publish

      - name: Clean publish artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path publish -Filter "*.pdb" -Recurse | Remove-Item -Force -ErrorAction SilentlyContinue

      - name: Zip release
        shell: pwsh
        run: |
          $zipName = "NetworkProfileManager-v${{ steps.ver.outputs.version }}-win-x64.zip"
          Compress-Archive -Path publish/* -DestinationPath $zipName -Force
          "Created $zipName ($((Get-Item $zipName).Length / 1MB) MB)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: NetworkProfileManager-v*-win-x64.zip
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Download

            1. Download **NetworkProfileManager-v${{ steps.ver.outputs.version }}-win-x64.zip**.
            2. Extract anywhere (e.g. `C:\Tools\NetworkProfileManager\`).
            3. Double-click `NetworkProfileManager.exe`. Accept the UAC prompt (netsh requires administrator rights).

            > If Windows SmartScreen shows an "Unknown publisher" warning → **More info → Run anyway.** The executable is currently unsigned.

            ## Updating
            No auto-updater — to upgrade, download the new zip and extract it over the previous folder. Your profiles live in `%LOCALAPPDATA%\NetworkProfileManager\data\` and survive updates.
